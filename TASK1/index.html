<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Медиа Арми – Тестовое задание</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <button id="showBtn" class="show-btn">Button</button>

    <div id="content" class="content hidden">
        <div class="top-banner">
            <div class="banner-rect big"></div>
            <div class="banner-rect small"></div>
        </div>
        <div class="cards-grid">
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 70%;"></div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 50%;"></div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 80%;"></div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 60%;"></div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 90%;"></div>
            </div>
            <div class="card">
                <div class="card-image"></div>
                <div class="card-footer" style="width: 40%;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
